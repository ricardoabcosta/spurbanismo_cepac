# =============================================================================
# CEPAC — Docker Compose para desenvolvimento local
# Banco: Azure PostgreSQL (cepac-pgdb.postgres.database.azure.com)
# Migrations já aplicadas — serviço migrate desabilitado.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # API FastAPI / uvicorn — aponta para Azure PostgreSQL
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: cepac_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://cepacadmin:pr0d%40M2026@cepac-pgdb.postgres.database.azure.com:5432/cepac?ssl=require
      AZURE_AD_TENANT_ID: f398df9c-fd0c-4829-a003-c770a1c4a063
      AZURE_AD_CLIENT_ID: "e7525560-a7ae-4688-8ea9-6f1f923ef8c3"
      DEV_BYPASS_AUTH: "false"
      AZURE_BLOB_ACCOUNT_NAME: cepacstorageacct
      AZURE_BLOB_ACCOUNT_KEY: ""
      AZURE_BLOB_CONTAINER_NAME: cepac-documentos
    ports:
      - "8001:8000"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Portal de Operações Técnicas
  # ---------------------------------------------------------------------------
  portal:
    build:
      context: ..
      dockerfile: infra/Dockerfile.portal
      args:
        VITE_API_BASE_URL: http://localhost:8001
        VITE_AZURE_CLIENT_ID: "39d6d992-23d8-4abf-b9a0-9b0f89bfe8bf"
        VITE_AZURE_API_CLIENT_ID: "e7525560-a7ae-4688-8ea9-6f1f923ef8c3"
        VITE_AZURE_TENANT_ID: "f398df9c-fd0c-4829-a003-c770a1c4a063"
        VITE_REDIRECT_URI: "http://localhost:3000/"
        VITE_DEV_BYPASS_AUTH: "false"
    container_name: cepac_portal
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

  # ---------------------------------------------------------------------------
  # Dashboard Executivo
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: ..
      dockerfile: infra/Dockerfile.dashboard
      args:
        VITE_API_BASE_URL: http://localhost:8001
        VITE_AZURE_CLIENT_ID: "39d6d992-23d8-4abf-b9a0-9b0f89bfe8bf"
        VITE_AZURE_API_CLIENT_ID: "e7525560-a7ae-4688-8ea9-6f1f923ef8c3"
        VITE_AZURE_TENANT_ID: "f398df9c-fd0c-4829-a003-c770a1c4a063"
        VITE_REDIRECT_URI: "http://localhost:3001/"
        VITE_DEV_BYPASS_AUTH: "false"
    container_name: cepac_dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3001:3001"
