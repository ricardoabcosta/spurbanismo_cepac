# =============================================================================
# CEPAC — nginx config para SPA React
# Todas as rotas não encontradas voltam ao index.html (react-router)
# =============================================================================

server {
    listen       3000;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # index.html nunca cacheado — garante que o browser sempre busca o HTML atualizado
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Assets com cache longo (hash no nome pelo Vite)
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Todas as rotas SPA → index.html
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Desabilita log de acesso para health probes
    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
